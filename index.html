<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Title: ϟ is Greek koppa, reads as lightning. Distinctive in any tab strip. -->
    <title>Pulse ϟ</title>

    <!-- Description: used by iMessage/Slack/SMS previews when pasted as a link -->
    <meta name="description" content="The signal, amplified. Neon Burro's command center." />

    <!-- Do not index — this is an internal tool -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />

    <!-- Icons — all sizes covered -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.webp" />
    <link rel="mask-icon" href="/favicon.svg" color="#00E5E5" />

    <!-- PWA / iOS home screen — behaves like a native app when saved -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color — sets browser chrome on mobile, respects OS theme -->
    <meta name="theme-color" content="#00E5E5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph — for iMessage, Slack, Discord, Signal, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Neon Burro" />
    <meta property="og:url" content="https://pulse.neonburro.com/" />
    <meta property="og:title" content="Pulse ϟ Neon Burro's command center" />
    <meta property="og:description" content="The signal, amplified." />
    <meta property="og:image" content="https://pulse.neonburro.com/main-sms-burro.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Neon Burro Pulse" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulse ϟ Neon Burro's command center" />
    <meta name="twitter:description" content="The signal, amplified." />
    <meta name="twitter:image" content="https://pulse.neonburro.com/main-sms-burro.webp" />

    <!-- Fonts — Inter (UI), JetBrains Mono (data/labels), Fraunces (editorial numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
